<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPU Cloud Pricing Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a2e;
  --surface: #232340;
  --surface2: #2a2a4a;
  --border: #3a3a5c;
  --text: #e0e0e8;
  --text-muted: #9090a8;
  --accent: #6c63ff;
  --accent-hover: #5a52d5;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
}

.container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }

header { text-align: center; padding: 2rem 0 1rem; }
header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.02em; }
header p { color: var(--text-muted); font-size: 0.95rem; margin-top: 0.3rem; }

.tabs {
  display: flex;
  gap: 0;
  margin-bottom: 1.25rem;
  border-bottom: 2px solid var(--border);
}

.tab {
  padding: 0.7rem 1.3rem;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-muted);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}

.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.tab-panel { display: none; }
.tab-panel.active { display: block; }

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  padding: 1rem 1.25rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 1.25rem;
  align-items: flex-start;
}

.control-group {
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
  min-width: 140px;
}

.control-group > label {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
}

select, button {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.45rem 0.65rem;
  font-size: 0.85rem;
  cursor: pointer;
  transition: border-color 0.15s;
}

select:hover, select:focus, button:hover {
  border-color: var(--accent);
  outline: none;
}

.provider-checkboxes {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem 0.75rem;
  max-width: 500px;
}

.provider-checkboxes label {
  display: flex;
  align-items: center;
  gap: 0.3rem;
  font-size: 0.82rem;
  cursor: pointer;
  text-transform: none;
  letter-spacing: normal;
  font-weight: 400;
  color: var(--text);
  white-space: nowrap;
}

.provider-checkboxes input[type="checkbox"] {
  accent-color: var(--accent);
  cursor: pointer;
}

.provider-toggle-btns {
  display: flex;
  gap: 0.4rem;
  margin-bottom: 0.25rem;
}

.provider-toggle-btns button {
  font-size: 0.7rem;
  padding: 0.2rem 0.5rem;
  background: var(--surface);
}

.chart-wrapper {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.25rem;
  margin-bottom: 1.25rem;
  position: relative;
}

.chart-wrapper canvas { width: 100% !important; }

.no-data-msg {
  text-align: center;
  color: var(--text-muted);
  padding: 3rem;
  font-size: 0.95rem;
}

.section-title {
  font-size: 1.1rem;
  margin-bottom: 0.75rem;
  font-weight: 600;
}

.summary-table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow-x: auto;
  margin-bottom: 1.25rem;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
}

thead th {
  background: var(--surface2);
  padding: 0.65rem 0.85rem;
  text-align: left;
  font-weight: 600;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

tbody td {
  padding: 0.55rem 0.85rem;
  border-bottom: 1px solid var(--border);
}

tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: var(--surface2); }

.color-dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-right: 0.4rem;
  vertical-align: middle;
}

.source-badge {
  display: inline-block;
  font-size: 0.65rem;
  padding: 0.15rem 0.4rem;
  border-radius: 4px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}

.source-badge.gpuhunt { background: #6c63ff33; color: #6c63ff; }
.source-badge.fsdl { background: #4ecdc433; color: #4ecdc4; }

footer {
  text-align: center;
  padding: 1.5rem 0;
  color: var(--text-muted);
  font-size: 0.8rem;
  border-top: 1px solid var(--border);
}

footer a { color: var(--accent); text-decoration: none; }
footer a:hover { text-decoration: underline; }

.loading { text-align: center; padding: 4rem; color: var(--text-muted); }

.error-msg {
  text-align: center;
  padding: 2rem;
  color: #ff6b6b;
  background: rgba(255, 107, 107, 0.1);
  border: 1px solid rgba(255, 107, 107, 0.2);
  border-radius: 10px;
}

.data-note {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 1rem;
  padding: 0.6rem 1rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
}

@media (max-width: 768px) {
  .controls { flex-direction: column; }
  .control-group { min-width: 100%; }
  header h1 { font-size: 1.4rem; }
  .tabs { overflow-x: auto; }
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>GPU Cloud Pricing Tracker</h1>
    <p>Historical and current GPU pricing from multiple open source datasets</p>
  </header>

  <div id="app">
    <div class="loading">Loading pricing data...</div>
  </div>
</div>

<script>
const PROVIDER_COLORS = [
  '#6c63ff', '#ff6b6b', '#4ecdc4', '#ffd93d', '#ff8a5c',
  '#a8e6cf', '#dcedc1', '#f38181', '#aa96da', '#95e1d3',
  '#c3bef7', '#f9c74f', '#90be6d', '#f94144', '#277da1',
  '#43aa8b', '#f3722c', '#577590', '#f8961e', '#9b5de5',
];

let data = null;
let gpuhuntChart = null;
let epochChart = null;

async function init() {
  try {
    const resp = await fetch('data/prices.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
    data = await resp.json();
    render();
  } catch (err) {
    document.getElementById('app').innerHTML =
      `<div class="error-msg">Failed to load data/prices.json: ${err.message}</div>`;
  }
}

function render() {
  const meta = data.metadata;

  // Build combined provider list from gpuhunt + fsdl
  const allProviders = new Set(meta.providers);
  if (data.fsdl) {
    data.fsdl.offers.forEach(o => allProviders.add(o.provider));
  }
  const providerList = [...allProviders].sort();
  const providerColors = {};
  providerList.forEach((p, i) => {
    providerColors[p] = PROVIDER_COLORS[i % PROVIDER_COLORS.length];
  });

  // GPU types: prefer V100/A100/H100/B200
  const allGpuSet = new Set(meta.gpu_types || []);
  if (data.fsdl) {
    data.fsdl.offers.forEach(o => allGpuSet.add(o.gpu_name));
  }
  const allGpuTypes = [...allGpuSet].sort();
  const preferredGpus = ['V100', 'A100', 'H100', 'B200'];
  const gpuTypes = preferredGpus.filter(g => allGpuTypes.includes(g)).concat(
    allGpuTypes.filter(g => !preferredGpus.includes(g))
  );
  const defaultGpu = gpuTypes.includes('H100') ? 'H100' : gpuTypes[0];

  // GPU counts
  const gpuCounts = new Set();
  data.snapshots.forEach(s => s.offers.forEach(o => gpuCounts.add(o.gpu_count)));
  if (data.fsdl) data.fsdl.offers.forEach(o => gpuCounts.add(o.gpu_count));
  const sortedGpuCounts = [...gpuCounts].sort((a, b) => a - b);

  const gpuOptionsSep = preferredGpus.filter(pg => allGpuTypes.includes(pg)).length;
  const gpuOptionsHtml = gpuTypes.map((g, i) => {
    const sep = (i === gpuOptionsSep && i > 0) ? '<option disabled>───────────</option>' : '';
    return sep + `<option value="${g}"${g === defaultGpu ? ' selected' : ''}>${g}</option>`;
  }).join('');

  const providerChecksHtml = providerList.map(p => `
    <label>
      <input type="checkbox" value="${p}" checked>
      <span class="color-dot" style="background:${providerColors[p]}"></span>${p}
    </label>
  `).join('');

  const hasFsdl = data.fsdl && data.fsdl.offers.length > 0;
  const hasEpoch = data.epoch_hardware && data.epoch_hardware.items.length > 0;

  document.getElementById('app').innerHTML = `
    <div class="tabs">
      <button class="tab active" data-tab="gpuhunt">Cloud Rental History</button>
      ${hasFsdl ? '<button class="tab" data-tab="comparison">Current Price Comparison</button>' : ''}
      ${hasEpoch ? '<button class="tab" data-tab="epoch">Hardware $/FLOP Trends</button>' : ''}
    </div>

    <!-- Tab 1: gpuhunt time series -->
    <div class="tab-panel active" id="panel-gpuhunt">
      <div class="controls" id="controls-gpuhunt">
        <div class="control-group">
          <label for="gpu-select">GPU Type</label>
          <select id="gpu-select">${gpuOptionsHtml}</select>
        </div>
        <div class="control-group" style="flex: 1; min-width: 280px;">
          <label>Providers</label>
          <div class="provider-toggle-btns">
            <button type="button" id="btn-all">All</button>
            <button type="button" id="btn-none">None</button>
          </div>
          <div class="provider-checkboxes" id="provider-checks">${providerChecksHtml}</div>
        </div>
        <div class="control-group">
          <label for="spot-select">Spot / On-Demand</label>
          <select id="spot-select">
            <option value="ondemand" selected>On-Demand</option>
            <option value="spot">Spot</option>
            <option value="both">Both</option>
          </select>
        </div>
        <div class="control-group">
          <label for="metric-select">Price Metric</label>
          <select id="metric-select">
            <option value="min_price" selected>Min Price</option>
            <option value="avg_price">Avg Price</option>
          </select>
        </div>
        <div class="control-group">
          <label for="gpucount-select">GPU Count</label>
          <select id="gpucount-select">
            <option value="all" selected>All</option>
            ${sortedGpuCounts.map(c => `<option value="${c}">${c}</option>`).join('')}
          </select>
        </div>
      </div>

      <div class="chart-wrapper" style="height:420px;">
        <canvas id="price-chart"></canvas>
        <div class="no-data-msg" id="no-data" style="display:none;">No data matching the current filters.</div>
      </div>

      <div>
        <h2 class="section-title">Latest Prices</h2>
        <div class="summary-table-wrap">
          <table>
            <thead>
              <tr>
                <th>Provider</th>
                <th>Price ($/hr)</th>
                <th>GPU Count</th>
                <th>Instance</th>
                <th>Locations</th>
                <th>Spot</th>
                <th>Source</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="summary-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Tab 2: FSDL current comparison -->
    ${hasFsdl ? `
    <div class="tab-panel" id="panel-comparison">
      <div class="data-note">
        Current snapshot from <a href="https://fullstackdeeplearning.com/cloud-gpus/" target="_blank">Full Stack Deep Learning</a>
        covering ${new Set(data.fsdl.offers.map(o => o.provider)).size} providers.
        Prices as of ${data.fsdl.date}.
      </div>
      <div class="controls" id="controls-fsdl">
        <div class="control-group">
          <label for="fsdl-gpu-select">GPU Type</label>
          <select id="fsdl-gpu-select">${gpuOptionsHtml}</select>
        </div>
        <div class="control-group">
          <label for="fsdl-spot-select">Spot / On-Demand</label>
          <select id="fsdl-spot-select">
            <option value="ondemand" selected>On-Demand</option>
            <option value="spot">Spot</option>
          </select>
        </div>
        <div class="control-group">
          <label for="fsdl-gpucount-select">GPU Count</label>
          <select id="fsdl-gpucount-select">
            <option value="all" selected>All</option>
            ${sortedGpuCounts.map(c => `<option value="${c}">${c}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="chart-wrapper" style="height:420px;">
        <canvas id="fsdl-chart"></canvas>
        <div class="no-data-msg" id="fsdl-no-data" style="display:none;">No data matching the current filters.</div>
      </div>
      <div>
        <h2 class="section-title">All Offers</h2>
        <div class="summary-table-wrap">
          <table>
            <thead>
              <tr>
                <th>Provider</th>
                <th>$/hr per GPU</th>
                <th>GPU Count</th>
                <th>Instance</th>
                <th>Spot</th>
              </tr>
            </thead>
            <tbody id="fsdl-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
    ` : ''}

    <!-- Tab 3: Epoch hardware -->
    ${hasEpoch ? `
    <div class="tab-panel" id="panel-epoch">
      <div class="data-note">
        Hardware purchase price-performance data from
        <a href="https://epoch.ai" target="_blank">Epoch AI</a> (CC-BY license).
        This tracks GPU purchase prices, not cloud rental rates. ${data.epoch_hardware.items.length} GPUs with price data.
      </div>
      <div class="chart-wrapper" style="height:460px;">
        <canvas id="epoch-chart"></canvas>
      </div>
      <div>
        <h2 class="section-title">Hardware Price History</h2>
        <div class="summary-table-wrap">
          <table>
            <thead>
              <tr>
                <th>GPU</th>
                <th>Release Date</th>
                <th>Price (USD)</th>
                <th>PFLOP/s</th>
                <th>$/PFLOP/s</th>
                <th>TDP (W)</th>
                <th>Memory (GB)</th>
              </tr>
            </thead>
            <tbody id="epoch-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
    ` : ''}

    <footer>
      <p>Last updated: ${data.last_updated}</p>
      <p style="margin-top:0.3rem;">
        Data sources:
        <a href="https://github.com/dstackai/gpuhunt" target="_blank">gpuhunt</a>,
        <a href="https://fullstackdeeplearning.com/cloud-gpus/" target="_blank">FSDL</a>,
        <a href="https://epoch.ai/data/ml_hardware.csv" target="_blank">Epoch AI</a>
      </p>
    </footer>
  `;

  // Tab switching
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    });
  });

  // gpuhunt controls
  const onGpuhuntChange = () => updateGpuhuntChart(providerColors);
  ['gpu-select', 'spot-select', 'metric-select', 'gpucount-select'].forEach(id => {
    document.getElementById(id).addEventListener('change', onGpuhuntChange);
  });
  document.querySelectorAll('#provider-checks input').forEach(cb => {
    cb.addEventListener('change', onGpuhuntChange);
  });
  document.getElementById('btn-all').addEventListener('click', () => {
    document.querySelectorAll('#provider-checks input').forEach(cb => cb.checked = true);
    onGpuhuntChange();
  });
  document.getElementById('btn-none').addEventListener('click', () => {
    document.querySelectorAll('#provider-checks input').forEach(cb => cb.checked = false);
    onGpuhuntChange();
  });

  updateGpuhuntChart(providerColors);

  // FSDL controls
  if (hasFsdl) {
    const onFsdlChange = () => updateFsdlView(providerColors);
    ['fsdl-gpu-select', 'fsdl-spot-select', 'fsdl-gpucount-select'].forEach(id => {
      document.getElementById(id).addEventListener('change', onFsdlChange);
    });
    updateFsdlView(providerColors);
  }

  // Epoch
  if (hasEpoch) {
    renderEpoch();
  }
}

// ─── gpuhunt time series ───

function getGpuhuntFilters() {
  return {
    gpu: document.getElementById('gpu-select').value,
    spotMode: document.getElementById('spot-select').value,
    metric: document.getElementById('metric-select').value,
    gpuCount: document.getElementById('gpucount-select').value,
    providers: [...document.querySelectorAll('#provider-checks input:checked')].map(cb => cb.value),
  };
}

function filterOffers(offers, filters) {
  return offers.filter(o => {
    if (o.gpu_name !== filters.gpu) return false;
    if (!filters.providers.includes(o.provider)) return false;
    if (filters.spotMode === 'spot' && !o.spot) return false;
    if (filters.spotMode === 'ondemand' && o.spot) return false;
    if (filters.gpuCount !== 'all' && o.gpu_count !== parseInt(filters.gpuCount)) return false;
    return true;
  });
}

function buildGpuhuntDatasets(filters, providerColors) {
  const seriesMap = {};
  data.snapshots.forEach(snapshot => {
    const date = snapshot.date;
    filterOffers(snapshot.offers, filters).forEach(offer => {
      let key = offer.provider;
      let label = offer.provider;
      if (filters.spotMode === 'both') {
        const tag = offer.spot ? 'spot' : 'on-demand';
        key = `${offer.provider}-${tag}`;
        label = `${offer.provider} (${tag})`;
      }
      if (!seriesMap[key]) seriesMap[key] = { label, provider: offer.provider, points: [] };
      const price = offer[filters.metric];
      if (price == null) return;
      const existing = seriesMap[key].points.find(p => p.x === date);
      if (existing) {
        if (price < existing.y) { existing.y = price; existing.meta = offer; }
      } else {
        seriesMap[key].points.push({ x: date, y: price, meta: offer });
      }
    });
  });

  return Object.values(seriesMap).map(series => {
    const color = providerColors[series.provider];
    const isSpot = series.label.includes('spot');
    return {
      label: series.label,
      data: series.points.sort((a, b) => a.x.localeCompare(b.x)),
      borderColor: color,
      backgroundColor: color + '22',
      borderWidth: 2,
      borderDash: isSpot ? [5, 3] : [],
      pointRadius: 2,
      pointHoverRadius: 5,
      tension: 0.2,
      fill: false,
    };
  });
}

function updateGpuhuntChart(providerColors) {
  const filters = getGpuhuntFilters();
  const datasets = buildGpuhuntDatasets(filters, providerColors);
  const canvas = document.getElementById('price-chart');
  const noData = document.getElementById('no-data');

  if (datasets.length === 0 || datasets.every(ds => ds.data.length === 0)) {
    canvas.style.display = 'none';
    noData.style.display = 'block';
    if (gpuhuntChart) { gpuhuntChart.destroy(); gpuhuntChart = null; }
    updateGpuhuntTable(filters, providerColors);
    return;
  }

  canvas.style.display = 'block';
  noData.style.display = 'none';
  const metricLabel = filters.metric === 'min_price' ? 'Min Price' : 'Avg Price';

  if (gpuhuntChart) gpuhuntChart.destroy();
  gpuhuntChart = new Chart(canvas, {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'nearest', intersect: false },
      plugins: {
        legend: {
          position: 'top',
          labels: { color: '#e0e0e8', usePointStyle: true, pointStyle: 'circle', padding: 16, font: { size: 12 } },
        },
        tooltip: {
          backgroundColor: '#232340ee', titleColor: '#e0e0e8', bodyColor: '#c0c0d0',
          borderColor: '#3a3a5c', borderWidth: 1, padding: 10,
          callbacks: {
            title: (items) => items[0]?.raw?.x || '',
            label: (ctx) => {
              const m = ctx.raw.meta;
              if (!m) return `${ctx.dataset.label}: $${ctx.raw.y.toFixed(2)}/hr`;
              return [
                `${ctx.dataset.label}: $${ctx.raw.y.toFixed(2)}/hr`,
                `Instance: ${(m.instance_names || []).join(', ') || '\u2014'}`,
                `GPU count: ${m.gpu_count}`,
                `Locations: ${(m.locations || []).slice(0, 4).join(', ')}${(m.locations || []).length > 4 ? '...' : ''}`,
              ];
            },
          },
        },
      },
      scales: {
        x: {
          type: 'time',
          time: { unit: 'month', tooltipFormat: 'yyyy-MM-dd', displayFormats: { month: 'MMM yyyy' } },
          ticks: { color: '#9090a8', maxTicksLimit: 14 },
          grid: { color: '#2a2a4a' },
        },
        y: {
          title: { display: true, text: `${metricLabel} ($/hr)`, color: '#9090a8' },
          ticks: { color: '#9090a8', callback: v => '$' + v.toFixed(2) },
          grid: { color: '#2a2a4a' },
          beginAtZero: false,
        },
      },
    },
  });

  updateGpuhuntTable(filters, providerColors);
}

function updateGpuhuntTable(filters, providerColors) {
  const tbody = document.getElementById('summary-tbody');
  if (!tbody) return;

  // Gather rows from gpuhunt (latest snapshot) and fsdl
  const rows = [];

  // gpuhunt latest
  for (let i = data.snapshots.length - 1; i >= 0; i--) {
    const snapshot = data.snapshots[i];
    const matched = filterOffers(snapshot.offers, filters);
    if (matched.length === 0) continue;
    const byProvider = {};
    matched.forEach(o => {
      const price = o[filters.metric];
      if (price == null) return;
      const key = filters.spotMode === 'both' ? `${o.provider}-${o.spot ? 'spot' : 'od'}` : o.provider;
      if (!byProvider[key] || price < byProvider[key][filters.metric]) byProvider[key] = o;
    });
    Object.values(byProvider).forEach(o => rows.push({ ...o, date: snapshot.date, source: 'gpuhunt' }));
    break;
  }

  // fsdl offers (if available)
  if (data.fsdl) {
    const fsdlMatched = filterOffers(data.fsdl.offers, filters);
    const byProvider = {};
    fsdlMatched.forEach(o => {
      const price = o[filters.metric];
      if (price == null) return;
      const key = filters.spotMode === 'both' ? `${o.provider}-${o.spot ? 'spot' : 'od'}` : o.provider;
      // Only add if not already present from gpuhunt or if cheaper
      if (!byProvider[key] || price < byProvider[key][filters.metric]) byProvider[key] = o;
    });
    Object.values(byProvider).forEach(o => {
      // Don't duplicate providers already in gpuhunt
      if (!rows.find(r => r.provider === o.provider && r.spot === o.spot)) {
        rows.push({ ...o, date: data.fsdl.date, source: 'fsdl' });
      }
    });
  }

  rows.sort((a, b) => a[filters.metric] - b[filters.metric]);

  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--text-muted);padding:1.5rem;">No data for current selection.</td></tr>';
    return;
  }

  tbody.innerHTML = rows.map(o => {
    const color = providerColors[o.provider] || '#888';
    const badge = `<span class="source-badge ${o.source}">${o.source}</span>`;
    return `<tr>
      <td><span class="color-dot" style="background:${color}"></span>${o.provider}</td>
      <td>$${o[filters.metric].toFixed(2)}</td>
      <td>${o.gpu_count}</td>
      <td>${(o.instance_names || []).join(', ') || '\u2014'}</td>
      <td>${(o.locations || []).slice(0, 3).join(', ')}${(o.locations || []).length > 3 ? '...' : ''}</td>
      <td>${o.spot ? 'Yes' : 'No'}</td>
      <td>${badge}</td>
      <td>${o.date}</td>
    </tr>`;
  }).join('');
}

// ─── FSDL comparison bar chart ───

let fsdlChart = null;

function updateFsdlView(providerColors) {
  const gpu = document.getElementById('fsdl-gpu-select').value;
  const spotMode = document.getElementById('fsdl-spot-select').value;
  const gpuCount = document.getElementById('fsdl-gpucount-select').value;

  const offers = data.fsdl.offers.filter(o => {
    if (o.gpu_name !== gpu) return false;
    if (spotMode === 'spot' && !o.spot) return false;
    if (spotMode === 'ondemand' && o.spot) return false;
    if (gpuCount !== 'all' && o.gpu_count !== parseInt(gpuCount)) return false;
    return true;
  });

  // Group by provider, pick cheapest
  const byProvider = {};
  offers.forEach(o => {
    if (!byProvider[o.provider] || o.min_price < byProvider[o.provider].min_price) {
      byProvider[o.provider] = o;
    }
  });

  const sorted = Object.values(byProvider).sort((a, b) => a.min_price - b.min_price);

  const canvas = document.getElementById('fsdl-chart');
  const noData = document.getElementById('fsdl-no-data');

  if (sorted.length === 0) {
    canvas.style.display = 'none';
    noData.style.display = 'block';
    if (fsdlChart) { fsdlChart.destroy(); fsdlChart = null; }
    document.getElementById('fsdl-tbody').innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:1.5rem;">No data.</td></tr>';
    return;
  }

  canvas.style.display = 'block';
  noData.style.display = 'none';

  if (fsdlChart) fsdlChart.destroy();
  fsdlChart = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: sorted.map(o => o.provider),
      datasets: [{
        label: '$/hr per GPU',
        data: sorted.map(o => o.min_price),
        backgroundColor: sorted.map(o => (providerColors[o.provider] || '#888') + 'cc'),
        borderColor: sorted.map(o => providerColors[o.provider] || '#888'),
        borderWidth: 1,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      indexAxis: 'y',
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#232340ee', titleColor: '#e0e0e8', bodyColor: '#c0c0d0',
          borderColor: '#3a3a5c', borderWidth: 1, padding: 10,
          callbacks: {
            label: (ctx) => {
              const o = sorted[ctx.dataIndex];
              return [
                `$${o.min_price.toFixed(2)}/hr per GPU`,
                `Instance: ${(o.instance_names || []).join(', ') || '\u2014'}`,
                `GPU count: ${o.gpu_count}`,
              ];
            },
          },
        },
      },
      scales: {
        x: {
          title: { display: true, text: '$/hr per GPU', color: '#9090a8' },
          ticks: { color: '#9090a8', callback: v => '$' + v.toFixed(2) },
          grid: { color: '#2a2a4a' },
        },
        y: {
          ticks: { color: '#e0e0e8', font: { size: 12 } },
          grid: { display: false },
        },
      },
    },
  });

  // Table
  document.getElementById('fsdl-tbody').innerHTML = sorted.map(o => {
    const color = providerColors[o.provider] || '#888';
    return `<tr>
      <td><span class="color-dot" style="background:${color}"></span>${o.provider}</td>
      <td>$${o.min_price.toFixed(2)}</td>
      <td>${o.gpu_count}</td>
      <td>${(o.instance_names || []).join(', ') || '\u2014'}</td>
      <td>${o.spot ? 'Yes' : 'No'}</td>
    </tr>`;
  }).join('');
}

// ─── Epoch hardware $/FLOP chart ───

function renderEpoch() {
  const items = data.epoch_hardware.items;
  const tbody = document.getElementById('epoch-tbody');

  // Chart: scatter plot of price-performance over time
  const points = items
    .filter(item => item.price_performance)
    .map(item => ({
      x: item.release_date,
      y: item.price_performance,
      name: item.name,
      price: item.release_price_usd,
      memory: item.memory_gb,
    }));

  // Color by era
  const canvas = document.getElementById('epoch-chart');
  if (epochChart) epochChart.destroy();

  epochChart = new Chart(canvas, {
    type: 'scatter',
    data: {
      datasets: [{
        label: 'FLOP/s per $',
        data: points,
        backgroundColor: points.map(p => {
          const y = parseInt(p.x.slice(0, 4));
          if (y >= 2023) return '#6c63ff';
          if (y >= 2020) return '#4ecdc4';
          if (y >= 2017) return '#ffd93d';
          if (y >= 2014) return '#ff8a5c';
          return '#ff6b6b';
        }),
        pointRadius: 6,
        pointHoverRadius: 9,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#232340ee', titleColor: '#e0e0e8', bodyColor: '#c0c0d0',
          borderColor: '#3a3a5c', borderWidth: 1, padding: 10,
          callbacks: {
            title: (items) => items[0]?.raw?.name || '',
            label: (ctx) => {
              const p = ctx.raw;
              const lines = [
                `Released: ${p.x}`,
                `Price: $${p.price.toLocaleString()}`,
                `FLOP/s per $: ${p.y.toExponential(2)}`,
              ];
              if (p.memory) lines.push(`Memory: ${p.memory} GB`);
              return lines;
            },
          },
        },
      },
      scales: {
        x: {
          type: 'time',
          time: { unit: 'year', tooltipFormat: 'yyyy-MM-dd', displayFormats: { year: 'yyyy' } },
          title: { display: true, text: 'Release Date', color: '#9090a8' },
          ticks: { color: '#9090a8' },
          grid: { color: '#2a2a4a' },
        },
        y: {
          type: 'logarithmic',
          title: { display: true, text: 'FLOP/s per $ (log scale)', color: '#9090a8' },
          ticks: {
            color: '#9090a8',
            callback: v => {
              const exp = Math.log10(v);
              if (Number.isInteger(exp)) return '10^' + exp;
              return '';
            },
          },
          grid: { color: '#2a2a4a' },
        },
      },
    },
  });

  // Table
  tbody.innerHTML = items.map(item => {
    const pflops = item.max_flops ? (item.max_flops / 1e15).toFixed(2) : '\u2014';
    const dolPerPflop = item.max_flops ? '$' + (item.release_price_usd / (item.max_flops / 1e15)).toFixed(0) : '\u2014';
    return `<tr>
      <td>${item.name}</td>
      <td>${item.release_date}</td>
      <td>$${item.release_price_usd.toLocaleString()}</td>
      <td>${pflops}</td>
      <td>${dolPerPflop}</td>
      <td>${item.tdp_watts || '\u2014'}</td>
      <td>${item.memory_gb || '\u2014'}</td>
    </tr>`;
  }).join('');
}

init();
</script>
